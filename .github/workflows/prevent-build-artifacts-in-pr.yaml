name: Prevent build artifacts in PR

on:
  pull_request:
    paths:
      - "custom_components/browser_mod/browser_mod.js"
      - "custom_components/browser_mod/browser_mod_panel.js"

jobs:
  check:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Fail if build artifacts are modified
        run: |
          echo "::error::Build artifacts (browser_mod.js / browser_mod_panel.js) must not be included in a pull request."
          echo "These files are generated by the release workflow and should only be updated during a release."
          echo "Please remove them from your branch: git checkout origin/${{ github.event.pull_request.base.ref }} -- custom_components/browser_mod/browser_mod.js custom_components/browser_mod/browser_mod_panel.js"
          exit 1
